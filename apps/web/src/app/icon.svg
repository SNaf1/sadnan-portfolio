<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded square background -->
  <rect width="32" height="32" rx="5" fill="#09090b"/>
  
  <!-- Sharp angular S: top-bar → down-left → mid-bar → down-right → bottom-bar
       Drawn as a thick stroke with square caps for maximum zig-zag sharpness -->
  <path
    d="M 22 9 H 10 V 16 H 22 V 23 H 10"
    fill="none"
    stroke="#3B82F6"
    stroke-width="4"
    stroke-linecap="square"
    stroke-linejoin="miter"
  />
</svg>
